<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Credit cards stacked -->
  <rect x="15" y="45" width="70" height="45" rx="6" fill="#0A2540" transform="rotate(-5 15 45)"/>
  <rect x="20" y="40" width="70" height="45" rx="6" fill="#F7931E"/>
  <!-- Card chip -->
  <rect x="28" y="52" width="14" height="10" rx="2" fill="#FFE4C4"/>
  <line x1="28" y1="57" x2="42" y2="57" stroke="#F7931E" stroke-width="1"/>
  <line x1="35" y1="52" x2="35" y2="62" stroke="#F7931E" stroke-width="1"/>
  <!-- Card lines -->
  <rect x="28" y="70" width="35" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="28" y="78" width="20" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Checkmark circle -->
  <circle cx="95" cy="35" r="18" fill="#4CAF50"/>
  <path d="M87 35 L92 40 L103 29" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Money/coins -->
  <circle cx="95" cy="90" r="12" fill="#FFD700" stroke="#F7931E" stroke-width="2"/>
  <text x="95" y="95" text-anchor="middle" fill="#F7931E" font-size="14" font-weight="bold">$</text>
</svg>
