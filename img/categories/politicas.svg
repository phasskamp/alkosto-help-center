<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Document/Policy paper -->
  <rect x="30" y="15" width="50" height="65" rx="4" fill="white" stroke="#0A2540" stroke-width="2"/>
  <!-- Document lines -->
  <rect x="38" y="25" width="34" height="4" rx="2" fill="#E0E0E0"/>
  <rect x="38" y="35" width="28" height="3" rx="1.5" fill="#E0E0E0"/>
  <rect x="38" y="42" width="32" height="3" rx="1.5" fill="#E0E0E0"/>
  <rect x="38" y="49" width="25" height="3" rx="1.5" fill="#E0E0E0"/>
  <rect x="38" y="56" width="30" height="3" rx="1.5" fill="#E0E0E0"/>
  <rect x="38" y="63" width="22" height="3" rx="1.5" fill="#E0E0E0"/>
  <!-- Privacy shield/lock -->
  <circle cx="85" cy="35" r="20" fill="#F7931E" opacity="0.15"/>
  <rect x="77" y="30" width="16" height="14" rx="2" fill="#F7931E"/>
  <path d="M80 30 L80 25 Q85 18 90 25 L90 30" stroke="#F7931E" stroke-width="3" fill="none"/>
  <circle cx="85" cy="37" r="2" fill="white"/>
  <!-- Checkmark badge -->
  <circle cx="75" cy="90" r="18" fill="#4CAF50"/>
  <path d="M67 90 L72 95 L83 84" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Person reading -->
  <circle cx="25" cy="95" r="10" fill="#FFD6B3"/>
  <rect x="20" y="105" width="10" height="8" fill="#0A2540"/>
</svg>
